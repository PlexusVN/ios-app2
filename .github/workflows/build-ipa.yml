name: Build IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build Configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: SensiUltralock
  SCHEME: SensiUltralock
  CONFIGURATION: ${{ github.event_name == 'push' && 'Release' || 'Debug' }}

jobs:
  build:
    name: Build IPA (${{ github.event_name == 'push' && 'Release' || 'Debug' }})
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Generate Xcode Project
        shell: bash
        run: |
          python3 -c "
import os, hashlib

PROJ = os.getcwd()
SRC = os.path.join(PROJ, 'SensiUltralock')
OUT = os.path.join(PROJ, 'SensiUltralock.xcodeproj')

def hid(s):
    return hashlib.md5(s.encode()).hexdigest().upper()[:24]

rid = hid('root')
mgid = hid('main')
pgid = hid('products')
tid = hid('target')
rgid = hid('resources')
fgid = hid('frameworks')
cdid = hid('cfg_debug')
crid = hid('cfg_release')
tdid = hid('tgt_debug')
trid = hid('tgt_release')
clid = hid('config_list')
tclid = hid('tgt_config_list')
prid = hid('product_ref')
sbpid = hid('sources_bp')
fbpid = hid('frameworks_bp')
rbpid = hid('resources_bp')
aref = hid('fref_Assets')
abid = hid('bf_Assets')

swift_files = []
for root, dirs, files in os.walk(SRC):
    for f in files:
        if f.endswith('.swift'):
            fp = os.path.relpath(os.path.join(root, f), PROJ).replace('\\\\', '/')
            swift_files.append(fp)

frefs = {}
bfs = {}
for sf in sorted(swift_files):
    fid = hid('fref_' + sf)
    bid = hid('bf_' + sf)
    frefs[sf] = fid
    bfs[sf] = bid

def q(s):
    return s

lines = []
lines.append('// !$*UTF8*$!')
lines.append('{')
lines.append('\tarchiveVersion = 1;')
lines.append('\tclasses = {')
lines.append('\t}')
lines.append('\tobjectVersion = 56;')
lines.append('\tobjects = {')
lines.append('')

# PBXBuildFile
lines.append('/* Begin PBXBuildFile section */')
for sf in sorted(bfs):
    bn = os.path.basename(sf)
    lines.append(f'\t\t{bfs[sf]} /* {bn} in Sources */ = {{isa = PBXBuildFile; fileRef = {frefs[sf]} /* {bn} */; }};')
lines.append(f'\t\t{abid} /* Assets.xcassets in Resources */ = {{isa = PBXBuildFile; fileRef = {aref} /* Assets.xcassets */; }};')
lines.append('/* End PBXBuildFile section */')
lines.append('')

# PBXFileReference
lines.append('/* Begin PBXFileReference section */')
for sf in sorted(frefs):
    bn = os.path.basename(sf)
    ext = os.path.splitext(sf)[1]
    ft = 'sourcecode.swift' if ext == '.swift' else 'file'
    lines.append(f'\t\t{frefs[sf]} /* {bn} */ = {{isa = PBXFileReference; lastKnownFileType = {ft}; path = {bn}; sourceTree = \"<group>\"; }};')
lines.append(f'\t\t{aref} /* Assets.xcassets */ = {{isa = PBXFileReference; lastKnownFileType = folder.assetcatalog; path = Assets.xcassets; sourceTree = \"<group>\"; }};')
lines.append(f'\t\t{prid} /* SensiUltralock.app */ = {{isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = SensiUltralock.app; sourceTree = BUILT_PRODUCTS_DIR; }};')
lines.append('/* End PBXFileReference section */')
lines.append('')

# PBXGroup
dirs_set = sorted(set(os.path.dirname(sf) for sf in swift_files))
lines.append('/* Begin PBXGroup section */')
lines.append(f'\t\t{mgid} = {{')
lines.append('\t\t\tisa = PBXGroup;')
ch = f'\t\t\t\t{rgid} /* SensiUltralock */,'
ch += f'\n\t\t\t\t{pgid} /* Products */,'
lines.append(f'\t\t\tchildren = (')
lines.append(f'{ch}')
lines.append('\t\t\t);')
lines.append('\t\t\tsourceTree = \"<group>\";')
lines.append('\t\t};')

lines.append(f'\t\t{pgid} = {{')
lines.append('\t\t\tisa = PBXGroup;')
lines.append(f'\t\t\tchildren = (')
lines.append(f'\t\t\t\t{prid} /* SensiUltralock.app */,')
lines.append('\t\t\t);')
lines.append('\t\t\tname = Products;')
lines.append('\t\t\tsourceTree = \"<group>\";')
lines.append('\t\t};')

lines.append(f'\t\t{rgid} = {{')
lines.append('\t\t\tisa = PBXGroup;')
lines.append('\t\t\tchildren = (')
for d in dirs_set:
    did = hid('grp_' + d)
    lines.append(f'\t\t\t\t{did} /* {os.path.basename(d)} */,')
lines.append(f'\t\t\t\t{aref} /* Assets.xcassets */,')
lines.append('\t\t\t);')
lines.append('\t\t\tpath = SensiUltralock;')
lines.append('\t\t\tsourceTree = \"<group>\";')
lines.append('\t\t};')

for d in dirs_set:
    did = hid('grp_' + d)
    lines.append(f'\t\t{did} = {{')
    lines.append('\t\t\tisa = PBXGroup;')
    lines.append('\t\t\tchildren = (')
    for sf in sorted(bfs):
        if os.path.dirname(sf) == d:
            lines.append(f'\t\t\t\t{frefs[sf]} /* {os.path.basename(sf)} */,')
    lines.append('\t\t\t);')
    lines.append(f'\t\t\tpath = {os.path.basename(d)};')
    lines.append('\t\t\tsourceTree = \"<group>\";')
    lines.append('\t\t};')

lines.append(f'\t\t{fgid} = {{')
lines.append('\t\t\tisa = PBXGroup;')
lines.append('\t\t\tchildren = (')
lines.append('\t\t\t);')
lines.append('\t\t\tname = Frameworks;')
lines.append('\t\t\tsourceTree = \"<group>\";')
lines.append('\t\t};')
lines.append('/* End PBXGroup section */')
lines.append('')

# PBXNativeTarget
lines.append('/* Begin PBXNativeTarget section */')
lines.append(f'\t\t{tid} /* SensiUltralock */ = {{')
lines.append('\t\t\tisa = PBXNativeTarget;')
lines.append(f'\t\t\tbuildConfigurationList = {tclid};')
lines.append('\t\t\tbuildPhases = (')
lines.append(f'\t\t\t\t{sbpid} /* Sources */,')
lines.append(f'\t\t\t\t{fbpid} /* Frameworks */,')
lines.append(f'\t\t\t\t{rbpid} /* Resources */,')
lines.append('\t\t\t);')
lines.append('\t\t\tbuildRules = (')
lines.append('\t\t\t);')
lines.append('\t\t\tdependencies = (')
lines.append('\t\t\t);')
lines.append('\t\t\tname = SensiUltralock;')
lines.append('\t\t\tproductName = SensiUltralock;')
lines.append(f'\t\t\tproductReference = {prid};')
lines.append('\t\t\tproductType = \"com.apple.product-type.application\";')
lines.append('\t\t};')
lines.append('/* End PBXNativeTarget section */')
lines.append('')

# PBXProject
lines.append('/* Begin PBXProject section */')
lines.append(f'\t\t{rid} = {{')
lines.append('\t\t\tisa = PBXProject;')
lines.append('\t\t\tattributes = {')
lines.append('\t\t\t\tBuildIndependentTargetsInParallel = 1;')
lines.append('\t\t\t\tLastSwiftUpdateCheck = 1540;')
lines.append('\t\t\t\tLastUpgradeCheck = 1540;')
lines.append('\t\t\t\tTargetAttributes = {')
lines.append(f'\t\t\t\t\t{tid} = {{')
lines.append('\t\t\t\t\t\tCreatedOnToolsVersion = 15.4;')
lines.append('\t\t\t\t\t};')
lines.append('\t\t\t\t};')
lines.append('\t\t\t};')
lines.append(f'\t\t\tbuildConfigurationList = {clid};')
lines.append('\t\t\tcompatibilityVersion = \"Xcode 14.0\";')
lines.append('\t\t\tdevelopmentRegion = en;')
lines.append('\t\t\thasScannedForEncodings = 0;')
lines.append('\t\t\tknownRegions = (')
lines.append('\t\t\t\ten,')
lines.append('\t\t\t\tBase,')
lines.append('\t\t\t);')
lines.append(f'\t\t\tmainGroup = {mgid};')
lines.append(f'\t\t\tproductRefGroup = {pgid};')
lines.append('\t\t\tprojectDirPath = \"\";')
lines.append('\t\t\tprojectRoot = \"\";')
lines.append('\t\t\ttargets = (')
lines.append(f'\t\t\t\t{tid},')
lines.append('\t\t\t);')
lines.append('\t\t};')
lines.append('/* End PBXProject section */')
lines.append('')

# PBXSourcesBuildPhase
lines.append('/* Begin PBXSourcesBuildPhase section */')
lines.append(f'\t\t{sbpid} /* Sources */ = {{')
lines.append('\t\t\tisa = PBXSourcesBuildPhase;')
lines.append('\t\t\tbuildActionMask = 2147483647;')
lines.append('\t\t\tfiles = (')
for sf in sorted(bfs):
    lines.append(f'\t\t\t\t{bfs[sf]} /* {os.path.basename(sf)} in Sources */,')
lines.append('\t\t\t);')
lines.append('\t\t\trunOnlyForDeploymentPostprocessing = 0;')
lines.append('\t\t};')
lines.append('/* End PBXSourcesBuildPhase section */')
lines.append('')

# PBXFrameworksBuildPhase
lines.append('/* Begin PBXFrameworksBuildPhase section */')
lines.append(f'\t\t{fbpid} /* Frameworks */ = {{')
lines.append('\t\t\tisa = PBXFrameworksBuildPhase;')
lines.append('\t\t\tbuildActionMask = 2147483647;')
lines.append('\t\t\tfiles = (')
lines.append('\t\t\t);')
lines.append('\t\t\trunOnlyForDeploymentPostprocessing = 0;')
lines.append('\t\t};')
lines.append('/* End PBXFrameworksBuildPhase section */')
lines.append('')

# PBXResourcesBuildPhase
lines.append('/* Begin PBXResourcesBuildPhase section */')
lines.append(f'\t\t{rbpid} /* Resources */ = {{')
lines.append('\t\t\tisa = PBXResourcesBuildPhase;')
lines.append('\t\t\tbuildActionMask = 2147483647;')
lines.append('\t\t\tfiles = (')
lines.append(f'\t\t\t\t{abid} /* Assets.xcassets in Resources */,')
lines.append('\t\t\t);')
lines.append('\t\t\trunOnlyForDeploymentPostprocessing = 0;')
lines.append('\t\t};')
lines.append('/* End PBXResourcesBuildPhase section */')
lines.append('')

# XCBuildConfiguration (project level)
BUILD_SETTINGS_PROJ_DEBUG = '''\t\t\t\tALWAYS_SEARCH_USER_PATHS = NO;
\t\t\t\tCLANG_ENABLE_MODULES = YES;
\t\t\t\tCLANG_ENABLE_OBJC_ARC = YES;
\t\t\t\tIPHONEOS_DEPLOYMENT_TARGET = 16.0;
\t\t\t\tMTL_ENABLE_DEBUG_INFO = YES;
\t\t\t\tONLY_ACTIVE_ARCH = YES;
\t\t\t\tSDKROOT = iphoneos;
\t\t\t\tSWIFT_VERSION = 5.0;
\t\t\t\tDEBUG_INFORMATION_FORMAT = dwarf;'''

BUILD_SETTINGS_PROJ_RELEASE = '''\t\t\t\tALWAYS_SEARCH_USER_PATHS = NO;
\t\t\t\tCLANG_ENABLE_MODULES = YES;
\t\t\t\tCLANG_ENABLE_OBJC_ARC = YES;
\t\t\t\tIPHONEOS_DEPLOYMENT_TARGET = 16.0;
\t\t\t\tMTL_ENABLE_DEBUG_INFO = NO;
\t\t\t\tSDKROOT = iphoneos;
\t\t\t\tSWIFT_VERSION = 5.0;
\t\t\t\tVALIDATE_PRODUCT = YES;
\t\t\t\tDEBUG_INFORMATION_FORMAT = \"dwarf-with-dsym\";'''

BUILD_SETTINGS_TARGET = '''\t\t\t\tASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
\t\t\t\tCODE_SIGN_STYLE = Manual;
\t\t\t\tCODE_SIGNING_ALLOWED = NO;
\t\t\t\tCODE_SIGNING_REQUIRED = NO;
\t\t\t\tCURRENT_PROJECT_VERSION = 1;
\t\t\t\tGENERATE_INFOPLIST_FILE = YES;
\t\t\t\tINFOPLIST_FILE = SensiUltralock/Resources/Info.plist;
\t\t\t\tINFOPLIST_KEY_CFBundleDisplayName = \"Sensi Ultralock\";
\t\t\t\tINFOPLIST_KEY_UIApplicationSupportsMultipleScenes = NO;
\t\t\t\tINFOPLIST_KEY_UILaunchScreen_UIColorName = \"\";
\t\t\t\tINFOPLIST_KEY_UISupportedInterfaceOrientations = UIInterfaceOrientationPortrait;
\t\t\t\tINFOPLIST_KEY_UIViewControllerBasedStatusBarAppearance = NO;
\t\t\t\tIPHONEOS_DEPLOYMENT_TARGET = 16.0;
\t\t\t\tMARKETING_VERSION = 1.0.0;
\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER = com.sensiultralock.app;
\t\t\t\tPRODUCT_NAME = SensiUltralock;
\t\t\t\tSUPPORTED_PLATFORMS = \"iphoneos iphonesimulator\";
\t\t\t\tSUPPORTS_MACCATALYST = NO;
\t\t\t\tSUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD = NO;
\t\t\t\tSWIFT_EMIT_LOC_STRINGS = YES;
\t\t\t\tSWIFT_VERSION = 5.0;
\t\t\t\tTARGETED_DEVICE_FAMILY = 1;'''

lines.append('/* Begin XCBuildConfiguration section */')

lines.append(f'\t\t{cdid} /* Debug */ = {{')
lines.append('\t\t\tisa = XCBuildConfiguration;')
lines.append(f'\t\t\tbuildSettings = {{')
lines.append(f'{BUILD_SETTINGS_PROJ_DEBUG}')
lines.append('\t\t\t};')
lines.append('\t\t\tname = Debug;')
lines.append('\t\t};')

lines.append(f'\t\t{crid} /* Release */ = {{')
lines.append('\t\t\tisa = XCBuildConfiguration;')
lines.append(f'\t\t\tbuildSettings = {{')
lines.append(f'{BUILD_SETTINGS_PROJ_RELEASE}')
lines.append('\t\t\t};')
lines.append('\t\t\tname = Release;')
lines.append('\t\t};')

lines.append(f'\t\t{tdid} /* Debug */ = {{')
lines.append('\t\t\tisa = XCBuildConfiguration;')
lines.append(f'\t\t\tbuildSettings = {{')
lines.append(f'{BUILD_SETTINGS_TARGET}')
lines.append('\t\t\t};')
lines.append('\t\t\tname = Debug;')
lines.append('\t\t};')

lines.append(f'\t\t{trid} /* Release */ = {{')
lines.append('\t\t\tisa = XCBuildConfiguration;')
lines.append(f'\t\t\tbuildSettings = {{')
lines.append(f'{BUILD_SETTINGS_TARGET}')
lines.append('\t\t\t};')
lines.append('\t\t\tname = Release;')
lines.append('\t\t};')

lines.append('/* End XCBuildConfiguration section */')
lines.append('')

# XCConfigurationList
lines.append('/* Begin XCConfigurationList section */')
lines.append(f'\t\t{clid} = {{')
lines.append('\t\t\tisa = XCConfigurationList;')
lines.append('\t\t\tbuildConfigurations = (')
lines.append(f'\t\t\t\t{cdid} /* Debug */,')
lines.append(f'\t\t\t\t{crid} /* Release */,')
lines.append('\t\t\t);')
lines.append('\t\t\tdefaultConfigurationIsVisible = 0;')
lines.append('\t\t\tdefaultConfigurationName = Release;')
lines.append('\t\t};')

lines.append(f'\t\t{tclid} = {{')
lines.append('\t\t\tisa = XCConfigurationList;')
lines.append('\t\t\tbuildConfigurations = (')
lines.append(f'\t\t\t\t{tdid} /* Debug */,')
lines.append(f'\t\t\t\t{trid} /* Release */,')
lines.append('\t\t\t);')
lines.append('\t\t\tdefaultConfigurationIsVisible = 0;')
lines.append('\t\t\tdefaultConfigurationName = Release;')
lines.append('\t\t};')
lines.append('/* End XCConfigurationList section */')

lines.append('')
lines.append('\t};')
lines.append(f'\trootObject = {rid};')
lines.append('}')

pbx_content = '\n'.join(lines) + '\n'
os.makedirs(OUT, exist_ok=True)
with open(os.path.join(OUT, 'project.pbxproj'), 'w', newline='\\n') as f:
    f.write(pbx_content)

print(f'Generated {OUT}/project.pbxproj')
print(f'  Swift files: {len(swift_files)}')
print(f'  Line count: {len(lines)}')
"

      - name: Show Build Environment
        run: |
          xcodebuild -version
          swift --version
          echo "Build Configuration: ${{ env.CONFIGURATION }}"
          echo "Scheme: ${{ env.SCHEME }}"

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration "${{ env.CONFIGURATION }}"

      - name: Build & Archive
        run: |
          xcodebuild clean archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration "${{ env.CONFIGURATION }}" \
            -sdk iphoneos \
            -archivePath "${{ env.PROJECT_NAME }}.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | xcbeautify --renderer github-actions

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "${{ env.PROJECT_NAME }}.xcarchive" \
            -exportPath "./output" \
            -exportOptionsPlist .github/exportOptions.plist \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Verify IPA
        run: |
          if [ -f "./output/${{ env.PROJECT_NAME }}.ipa" ]; then
            echo "✅ IPA built successfully!"
            ls -lh "./output/${{ env.PROJECT_NAME }}.ipa"
          else
            echo "❌ IPA not found at expected path"
            ls -la ./output/ || true
            # Try to find any .ipa files
            find . -name "*.ipa" -type f 2>/dev/null
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PROJECT_NAME }}-${{ env.CONFIGURATION }}-${{ github.sha }}"
          path: |
            ./output/*.ipa
            ./output/*.app.dSYM.zip
          if-no-files-found: warn
          retention-days: 7

      - name: Notify Build Status
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ env.PROJECT_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Configuration**: ${{ env.CONFIGURATION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
