name: SensiUltralock
options:
  bundleIdPrefix: com.sensiultralock
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: SensiUltralock/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.sensiultralock.app
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: false
    CODE_SIGNING_ALLOWED: false
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1"
    UIRequiredDeviceCapabilities: ["arm64"]
    UISupportedInterfaceOrientations: ["UIInterfaceOrientationPortrait"]
    UILaunchScreen: "LaunchScreen"
    UIApplicationSupportsIndirectInputEvents: true
    UIViewControllerBasedStatusBarAppearance: false
    UIStatusBarHidden: false
    UIStatusBarStyle: UIStatusBarStyleLightContent
    APP_ICON: AppIcon

targets:
  SensiUltralock:
    type: application
    platform: iOS
    sources:
      - path: SensiUltralock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sensiultralock.app
        INFOPLIST_FILE: SensiUltralock/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: true
    info:
      path: SensiUltralock/Resources/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        CFBundleDisplayName: Sensi Ultralock
